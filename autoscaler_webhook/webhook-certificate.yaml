apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: webhook-cert
  namespace: webhook-system
spec:
  secretName: resource-webhook-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  commonName: resource-webhook.webhook-system.svc
  dnsNames:
    - resource-webhook.webhook-system.svc
    - resource-webhook.webhook-system.svc.cluster.local
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days before expiry
