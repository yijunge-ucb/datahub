name: Bug Report
description: Raise issues here
labels: "bug"
assignees:
- felder
- balajialg
- yijunge-ucb
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to help us improve DataHub! Please follow the sections in the template and provide as much information as possible. 
        
        > [!NOTE]
        > **FERPA Compliance:** Please remove or crop out any names, usernames, or email addresses before submitting. If the issue requires sharing specific user details, including their course affiliation, send them to datahub-support@berkeley.edu instead.
  - type: textarea
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment & setup
      description: In which environment does the problem occur
      value: |
        - Hub: <!--[e.g. Datahub, Data 8, Data 100, Public Health, ...]-->
        - Language: <!--[Python, Julia, R, ...]-->
    validations:
      required: true
  - type: textarea
    attributes:
      label: How to reproduce
      description: Steps to reproduce the behavior
      value: |
        <!--
        1. Go to '...'
        2. Change '....'
        3. Run '....'
        4. See error
        -->
    validations:
      required: true
