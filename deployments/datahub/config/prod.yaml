nfsPVC:
  nfs:
    shareName: shares/datahub/prod

jupyterhub:
  ingress:
    enabled: true
    hosts:
      - datahub.berkeley.edu
    tls:
      - secretName: tls-cert
        hosts:
          - datahub.berkeley.edu
  proxy:
    https:
      enabled: false
  hub:
    db:
      pvc:
        # This also holds logs
        storage: 80Gi
    resources:
      requests:
        # DataHub often takes up a full CPU now, so let's guarantee it at least that
        cpu: 1
        memory: 1Gi
      limits:
        memory: 2Gi
    loadRoles:
      grouper-sync:
        name: grouper-sync
        scopes:
          - list:users
          - read:users
          - admin:auth_state
        services:
          - grouper-sync
    services:
      grouper-sync:
        name: grouper-sync
        environment:
          JUPYTERHUB_API_URL: http://localhost:8081/hub/api
          GROUPER_BASE_URL: https://calgroups.berkeley.edu/gws/servicesRest/json/v2_2_100
          GROUPER_ID_PATH: edu:berkeley:app:datahub:datahub-users
                
  scheduling:
    userPlaceholder:
      enabled: false
