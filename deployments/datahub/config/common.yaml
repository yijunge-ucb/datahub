nfsPVC:
  enabled: true
  nfs:
    serverIP: 10.49.181.18

etcGitConfig:
  enabled: true
  gitconfig: |
    [credential "https://github.com"]
      helper = !git-credential-github-app --app-key-file /etc/github/github-app-private-key.pem --app-id 94384
      useHttpPath = true

jupyterhub:
  scheduling:
    userScheduler:
      nodeSelector:
        hub.jupyter.org/pool-name: core-pool-2024-05-08
  hub:
    config:
      Authenticator:
        auto_login_oauth2_authorize: True
    loadRoles:
      # datahub staff
      datahub-staff:
        description: Enable admin for datahub staff
        # this role provides permissions to...
        scopes:
          - admin-ui
          - admin:groups
          - admin:users
          - admin:servers
          - read:roles
          - read:hub
          - access:servers
        # this role will be assigned to...
        groups:
          - course::1524699::group::all-admins

   # Linguistics 243, Spring 2025, https://github.com/berkeley-dsep-infra/datahub/issues/6604
      course-staff-1541622:
      #  description: Enable course staff to view and access servers.
      #  # this role provides permissions to...
        scopes:
          - admin-ui
          - list:users!group=course::1541622
          - admin:servers!group=course::1541622
          - access:servers!group=course::1541622
      #  # this role will be assigned to...
        groups:
          - course::1541622::enrollment_type::teacher
          - course::1541622::enrollment_type::ta

   # Econ 148, Spring 2025, https://github.com/berkeley-dsep-infra/datahub/issues/6766
      course-staff-1541056:
      #  description: Enable course staff to view and access servers.
      #  # this role provides permissions to...
        scopes:
          - admin-ui
          - list:users!group=course::1541056
          - admin:servers!group=course::1541056
          - access:servers!group=course::1541056
      #  # this role will be assigned to...
        groups:
          - course::1541056::enrollment_type::teacher
          - course::1541056::enrollment_type::ta

   # Econ 140, Spring 2025, https://github.com/berkeley-dsep-infra/datahub/issues/6799
      course-staff-1542035:
      #  description: Enable course staff to view and access servers.
      #  # this role provides permissions to...
        scopes:
          - admin-ui
          - list:users!group=course::1542035
          - admin:servers!group=course::1542035
          - access:servers!group=course::1542035
      #  # this role will be assigned to...
        groups:
          - course::1542035::enrollment_type::teacher
          - course::1542035::enrollment_type::ta

    nodeSelector:
      hub.jupyter.org/pool-name: core-pool-2024-05-08
    initContainers:
      # There's another sidecar, specified in `secrets/staging.yaml` and `secrets/prod.yaml`
      # that keeps this up to date. https://github.com/jupyterhub/kubespawner/issues/468
      # should help us move that back here.
      - name: templates-clone
        image: alpine/git
        args:
          - clone
          - --depth=1
          - --single-branch
          - --
          - https://github.com/berkeley-dsep-infra/datahub-homepage
          - /srv/repo
        securityContext:
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        volumeMounts:
          - name: custom-templates
            mountPath: /srv/repo
    extraVolumes:
      - name: custom-templates
        emptyDir: {}
    extraVolumeMounts:
      - mountPath: /usr/local/share/jupyterhub/custom_templates
        name: custom-templates
        subPath: "templates"
      - mountPath: /usr/local/share/jupyterhub/static/extra-assets
        name: custom-templates
        subPath: "extra-assets"
    extraConfig:
      04-custom-theme: |
        c.JupyterHub.template_paths = ['/usr/local/share/jupyterhub/custom_templates/']

  proxy:
    chp:
      nodeSelector:
        hub.jupyter.org/pool-name: core-pool-2024-05-08
      resources:
        requests:
          # FIXME: We want no guarantees here!!!
          # This is lowest possible value
          cpu: 0.001
          memory: 3Gi
        limits:
          memory: 3Gi

  singleuser:
    extraEnv:
      GH_SCOPED_CREDS_CLIENT_ID: Iv23ct7Qx1mAotaIIYx9
      GH_SCOPED_CREDS_APP_URL: https://github.com/apps/berkeley-datahub-git-access
      # Unset NotebookApp from hub/values. Necessary for recent lab versions.
      JUPYTERHUB_SINGLEUSER_APP: "jupyter_server.serverapp.ServerApp"
    nodeSelector:
      hub.jupyter.org/pool-name: datahub-pool
    storage:
      type: static
      static:
        pvcName: home-nfs-v3
        subPath: "{username}"
      extraVolumes:
        - name: etc-gitconfig
          secret:
            secretName: user-etc-gitconfig
      extraVolumeMounts:
        - name: etc-gitconfig
          mountPath: /srv/conda/etc/gitconfig
          subPath: gitconfig
          readOnly: true
        - name: etc-gitconfig
          mountPath: /etc/github/github-app-private-key.pem
          subPath: github-app-private-key.pem
          readOnly: true
        # RStudio can't write session files to anywhere except ~/.rstudio -
        # only way to change that is by setting $HOME. So instead, we just
        # bind mount a fresh directory on top of ~/.rstudio!
        - name: home
          mountPath: /home/jovyan/.rstudio
          subPath: '{username}/.datahub-rstudio'
    extraFiles:
      # DH-305
      remove-exporters:
        mountPath: /etc/jupyter/jupyter_notebook_config.py
        stringData: |
          c.QtPDFExporter.enabled = False
          c.QtPNGExporter.enabled = False
          c.WebPDFExporter.embed_images = True
    memory:
      guarantee: 512M
      limit: 1G
    image: {}

  custom:
    group_profiles:
      # DataHub Infrastructure staff
      # https://bcourses.berkeley.edu/courses/1524699/groups#tab-80607
      course::1524699::group::all-admins:
        mem_limit: 4096M
        mem_guarantee: 4096M

      # ENVECON 153, Spring 25, https://github.com/berkeley-dsep-infra/datahub/issues/6575
      course::1541477:
        mem_limit: 4096M
        mem_guarantee: 4096M

      # ECON 148, Spring 25, https://github.com/berkeley-dsep-infra/datahub/issues/6576
      course::1541056:
        mem_limit: 4096M
        mem_guarantee: 4096M

      # Demog 175, Spring 25, https://github.com/berkeley-dsep-infra/datahub/issues/6725
      course::1542976:
        mem_limit: 4096M
        mem_guarantee: 4096M

      # Legal Studies 123, Spring 25, https://github.com/berkeley-dsep-infra/datahub/issues/6828
      course::1542364:
        mem_limit: 4096M
        mem_guarantee: 4096M

      # PS 231D, Spring 25, https://github.com/berkeley-dsep-infra/datahub/issues/6875, To be removed by end of March
      course::1542527:
        mem_limit: 16384M
        mem_guarantee: 16384M

 # Econ 148, Spring 2025, https://github.com/berkeley-dsep-infra/datahub/issues/6901
      course::1541056::enrollment_type::teacher:
        extraVolumeMounts:
          - name: home
            mountPath: /home/jovyan/_shared/econ148-readwrite
            subPath: _shared/2025-spring/courses/1541056
            readOnly: false
      course::1541056::enrollment_type::ta:
        extraVolumeMounts:
          - name: home
            mountPath: /home/jovyan/_shared/econ148-readwrite
            subPath: _shared/2025-spring/courses/1541056
            readOnly: false
      course::1541056::enrollment_type::student:
        extraVolumeMounts:
          - name: home
            mountPath: /home/jovyan/_shared/econ148-readonly
            subPath: _shared/2025-spring/courses/1541056
            readOnly: true
