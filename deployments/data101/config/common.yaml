nfsPVC:
  enabled: true
  nfs:
    serverIP: 10.155.229.138

jupyterhub:
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
  scheduling:
    userScheduler:
      nodeSelector:
        hub.jupyter.org/pool-name: core-pool-2024-05-08
  prePuller:
    extraImages:
      postgres:
        name: us-central1-docker.pkg.dev/ucb-datahub-2018/core/postgres
        tag: 20240731-224556.git.9421.ha935e5da
  proxy:
    chp:
      nodeSelector:
        hub.jupyter.org/pool-name: core-pool-2024-05-08
      resources:
        requests:
          # FIXME: We want no guarantees here!!!
          # This is lowest possible value
          cpu: 0.001
          memory: 3Gi
        limits:
          memory: 3Gi
  hub:
    config:
      OAuthenticator:
        allow_all: False
        allowed_groups:
          # Data 101, Fall 2024, Staff Access
          # https://bcourses.berkeley.edu/courses/1536858
          - "course::1536858::enrollment_type::teacher"
          # Data 101, Spring 2025
          # https://bcourses.berkeley.edu/courses/1542742
          - "course::1547305"
          # Data 101, Fall 2025
          # https://bcourses.berkeley.edu/courses/1547305
          - "course::1547305"
          # DataHub staff
          - "course::1524699::group::all-admins"
    loadRoles:
      # datahub staff
      datahub-staff:
        description: Enable admin for datahub staff
        # this role provides permissions to...
        scopes:
          - admin-ui
          - admin:groups
          - admin:users
          - admin:servers
          - read:roles
          - read:hub
          - access:servers
        # this role will be assigned to...
        groups:
          - course::1524699::group::all-admins
      course-staff-1547305:
        ## Course: DATA 101 Bcourses ID: 1547305 End Date: 09/04/2025 
        ## See issue https://github.com/berkeley-dsep-infra/datahub/issues/7448 for more details.
        description: Enable course staff to view and access servers.
        scopes:
          - admin-ui
          - list:users!group=course::1547305
          - admin:servers!group=course::1547305
          - access:servers!group=course::1547305
        groups:
          - course::1547305::enrollment_type::teacher
          - course::1547305::enrollment_type::ta
      ## Data 101, Spring 2024
      #course-staff-N:
      #  description: Enable course staff to view and access servers.
      #  # this role provides permissions to...
      #  scopes:
      #    - admin-ui
      #    - list:users!group=course::N
      #    - admin:servers!group=course::N
      #    - access:servers!group=course::N
      #  # this role will be assigned to...
      #  groups:
      #    - course::N::group::Admins

    extraConfig:
      data101-new-db: |
        from jupyterhub.utils import exponential_backoff
        from kubespawner.objects import make_pvc
        from functools import partial

        def make_extra_pvc(component, name_template, storage_class, storage_capacity, spawner):
          labels = spawner._build_common_labels({})
          labels.update({
              'component': component
          })
          annotations = spawner._build_common_annotations({})
          storage_selector = spawner._expand_all(spawner.storage_selector)
          return make_pvc(
              name=spawner._expand_all(name_template),
              storage_class=storage_class,
              access_modes=['ReadWriteOnce'],
              selector={},
              storage=storage_capacity,
              labels=labels,
              annotations=annotations
          )

        make_db_pvc = partial(make_extra_pvc, 'db-storage', 'db-{username}', 'standard', '4G')
        make_mongo_pvc = partial(make_extra_pvc, 'mongo-storage', 'mongo-{username}', 'standard', '2G')

        pvc_makers = (make_db_pvc, make_mongo_pvc)
        async def ensure_db_pvc(spawner):
          """"
          Ensure a PVC is created for this user's database volume
          """
          for pvc_maker in pvc_makers:
            pvc = pvc_maker(spawner)
            # If there's a timeout, just let it propagate
            await exponential_backoff(
                partial(spawner._make_create_pvc_request, pvc, spawner.k8s_api_request_timeout),
                f'Could not create pvc {pvc.metadata.name}',
                # Each req should be given k8s_api_request_timeout seconds.
                timeout=spawner.k8s_api_request_retry_timeout
            )
        c.Spawner.pre_spawn_hook = ensure_db_pvc
    nodeSelector:
      hub.jupyter.org/pool-name: core-pool-2024-05-08

  singleuser:
    extraFiles:
      # DH-305
      remove-exporters:
        mountPath: /etc/jupyter/jupyter_notebook_config.py
        stringData: |
          c.QtPDFExporter.enabled = False
          c.QtPNGExporter.enabled = False
          c.WebPDFExporter.embed_images = True
    extraContainers:
      - name: mongo
        image: mongo:5.0.11
        args:
          # We run mongodb without authentication, but only listening on localhost
          # This matches what we do for postgres
          - --bind_ip
          - 127.0.0.1
        volumeMounts:
        - name: home
          mountPath: /home/jovyan
          subPath: "{username}"
        - name: mongodb
          mountPath: /data/db
        securityContext:
          runAsUser: 1000
        resources:
          limits:
            # Best effort only. No more than 1 CPU
            memory: 512Mi
            cpu: 1.0
          requests:
            # If we don't set requests, k8s sets requests == limits!
            memory: 64Mi
            cpu: 0.01
      - name: postgres
        image: us-central1-docker.pkg.dev/ucb-datahub-2018/core/postgres:20240731-224556.git.9076.h5fdc5d69
        resources:
          limits:
            # Best effort only. No more than 1 CPU
            memory: 512Mi
            cpu: 1.0
          requests:
            # If we don't set requests, k8s sets requests == limits!
            memory: 64Mi
            cpu: 0.01
        env:
        - name: POSTGRES_HOST_AUTH_METHOD
          value: "trust"
        - name: POSTGRES_USER
          value: "jovyan"
        securityContext:
          runAsUser: 1000
        volumeMounts:
        - name: home
          mountPath: /home/jovyan
          subPath: "{username}"
        - name: postgres-db
          mountPath: /var/lib/postgresql/data
          # postgres recommends against mounting a volume directly here
          # So we put data in a subpath
          subPath: data
    initContainers:
      #  /var/lib/postgresql should be writeable by uid 1000, so students
      #  can blow out their db directories if need to. Just setting UID on the
      #  postgres server should have been enough - but because we did not do it
      #  early enough, many users have data dirs owned by uid 999.
      #  We explicitly chown them back. We should remove this eventually.
      - name: postgres-volume-mount-hack
        image: busybox
        command: ["sh", "-c", "id && chown -R 1000:1000 /var/lib/postgresql && ls -lhd /var/lib/postgresql"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: postgres-db
          mountPath: /var/lib/postgresql/data
          # postgres recommends against mounting a volume directly here
          # So we put data in a subpath
          subPath: data
    nodeSelector:
      hub.jupyter.org/pool-name: data101-pool
    defaultUrl: /lab
    extraEnv:
      # Unset NotebookApp from hub/values. Necessary for recent lab versions.
      JUPYTERHUB_SINGLEUSER_APP: "jupyter_server.serverapp.ServerApp"
    storage:
      type: static
      static:
        pvcName: home-nfs-v3
        subPath: "{username}"
      extraVolumes:
        - name: postgres-db
          persistentVolumeClaim:
            claimName: 'db-{username}'
        - name: mongodb
          persistentVolumeClaim:
            claimName: 'mongo-{username}'
      extraVolumeMounts:
        - name: postgres-db
          mountPath: /var/lib/postgresql/data
          # postgres recommends against mounting a volume directly here
          # So we put data in a subpath
          subPath: data
        - name: mongodb
          mountPath: /data/db
    memory:
      guarantee: 3G
      limit: 3G

  custom:
    group_profiles:
  # DataHub Infrastructure staff
      # https://bcourses.berkeley.edu/courses/1524699/groups#tab-80607
      course::1524699::group::all-admins:
        mem_limit: 4G
        mem_guarantee: 2G

# This is a template for configuring shared directories in Data101 Hub.

# --- Teacher Configuration ---
# This section configures settings for teachers enrolled in the course.
# course::<course_id>::enrollment_type::teacher:
#   extraVolumeMounts:
#     - name: home
#       # Mount path where teachers can have read/write access.
#       mountPath: /home/jovyan/_shared/<your-course>-readwrite
#       # Sub-path within the filesystem for the course.
#       subPath: _shared/<year-semester>/courses/<course_id>
#       # Set readOnly to false to allow write permissions for teachers.
#       readOnly: false

# --- Teaching Assistant (TA) Configuration ---
# This section configures settings for TAs enrolled in the course.
# course::<course_id>::enrollment_type::ta:
#   extraVolumeMounts:
#     - name: home
#       # Mount path where TAs can have read/write access.
#       mountPath: /home/jovyan/_shared/<your-course>-readwrite
#       # Sub-path within the filesystem for the course.
#       subPath: _shared/<year-semester>/courses/<course_id>
#       # Set readOnly to false to allow write permissions for TAs.
#       readOnly: false

# --- Student Configuration ---
# This section configures settings for students enrolled in the course.
# course::<course_id>::enrollment_type::student:
#   extraVolumeMounts:
#     - name: home
#       # Mount path where students have read-only access.
#       mountPath: /home/jovyan/_shared/<your-course>-readonly
#       # Sub-path within the filesystem for the course.
#       subPath: _shared/<year-semester>/courses/<course_id>
#       # Set readOnly to true to restrict write permissions for students.
#       readOnly: true
      course::1547305::enrollment_type::teacher:
      ## Course Name: bcourses-1547305 Bcourses ID: 1547305 End Date: 12/19/2025
      ## See issue https://github.com/berkeley-dsep-infra/datahub/issues/7545 for details.
        extraVolumeMounts:
          - name: home
            mountPath: /home/jovyan/_shared/data101-readwrite
            subPath: _shared/2025-spring/courses/1542742
            readOnly: false
      course::1547305::enrollment_type::ta:
      ## Course Name: bcourses-1547305 Bcourses ID: 1547305 End Date: 12/19/2025
      ## See issue https://github.com/berkeley-dsep-infra/datahub/issues/7545 for details.
        extraVolumeMounts:
          - name: home
            mountPath: /home/jovyan/_shared/data101-readwrite
            subPath: _shared/2025-spring/courses/1542742
            readOnly: false
      course::1547305::enrollment_type::student:
      ## Course Name: bcourses-1547305 Bcourses ID: 1547305 End Date: 12/19/2025
      ## See issue https://github.com/berkeley-dsep-infra/datahub/issues/7545 for details.
        extraVolumeMounts:
          - name: home
            mountPath: /home/jovyan/_shared/data101-readonly
            subPath: _shared/2025-spring/courses/1542742
            readOnly: true
