nfsPVC:
  nfs:
    shareName: shares/astro/prod

jupyterhub:
  ingress:
    enabled: true
    hosts:
      - astro.datahub.berkeley.edu
    tls:
      - secretName: tls-cert
        hosts:
          - astro.datahub.berkeley.edu
  hub:
    db:
      pvc:
        # This also holds logs
        storage: 4Gi
    loadRoles:
      grouper-sync:
        name: grouper-sync
        scopes:
          - list:users
          - read:users
          - admin:auth_state
        services:
          - grouper-sync
    services:
      grouper-sync:
        name: grouper-sync
        environment:
          JUPYTERHUB_API_URL: http://localhost:8081/hub/api
          GROUPER_BASE_URL: https://calgroups.berkeley.edu/gws/servicesRest/json/v2_2_100
          GROUPER_ID_PATH: edu:berkeley:app:datahub:datahub-astro-users
  
  singleuser:
    storage:
      extraVolumes:
        - name: conda-shared-instr-prod
          persistentVolumeClaim:
            claimName: pvc-astro-conda-instr-prod
        - name: conda-shared-stud-prod
          persistentVolumeClaim:
            claimName: pvc-astro-conda-stud-prod

  custom:
    group_profiles:
      course::1548766::enrollment_type::teacher:
        extraVolumeMounts:
          - name: conda-shared-instr-prod
            mountPath: /srv/conda/envs/shared
            subPath: conda_shared/1548766
            readOnly: false
      course::1548766::enrollment_type::ta:
        extraVolumeMounts:
          - name: conda-shared-instr-prod
            mountPath: /srv/conda/envs/shared
            subPath: conda_shared/1548766
            readOnly: false
      course::1548766::enrollment_type::student:
        extraVolumeMounts:
          - name: conda-shared-stud-prod
            mountPath: /srv/conda/envs/shared
            subPath: conda_shared/1548766
            readOnly: true