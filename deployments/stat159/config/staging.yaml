          - name: home
            mountPath: /home/jovyan/_shared/bcourses-1546508-readwrite
            subPath: _shared/2025-fall/courses/1546508
            readOnly: false
          - name: home
            mountPath: /home/jovyan/_shared/bcourses-1546508
            subPath: _shared/2025-fall/courses/1546508
            readOnly: true
          - name: conda-shared-instr-staging
            mountPath: /srv/conda/envs/shared
