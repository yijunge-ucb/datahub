nfsPVC:
  nfs:
    shareName: shares/nature/staging

jupyterhub:
  scheduling:
    userScheduler:
      replicas: 1
  prePuller:
    continuous:
      enabled: false
  ingress:
    enabled: true
    hosts:
      - nature-staging.datahub.berkeley.edu
    tls:
      - secretName: tls-cert
        hosts:
          - nature-staging.datahub.berkeley.edu

  singleuser:
    storage:
      extraVolumes:
        - name: conda-shared-instr-staging
          persistentVolumeClaim:
            claimName: pvc-nature-conda-instr-staging
        - name: conda-shared-stud-staging
          persistentVolumeClaim:
            claimName: pvc-nature-conda-stud-staging

  custom:
    group_profiles:
      course::1546503::enrollment_type::ta:
        extraVolumeMounts:
          - name: conda-shared-instr-staging
            mountPath: /srv/conda/envs/shared
            subPath: conda_shared/1546503
            readOnly: false
      course::1546503::enrollment_type::teacher:
        extraVolumeMounts:
          - name: conda-shared-instr-staging
            mountPath: /srv/conda/envs/shared
            subPath: conda_shared/1546503
            readOnly: false
      course::1546503::enrollment_type::ta:
        extraVolumeMounts:
          - name: conda-shared-stud-staging
            mountPath: /srv/conda/envs/shared
            subPath: conda_shared/1546503
            readOnly: true