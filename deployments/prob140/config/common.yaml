nfsPVC:
  enabled: true
  nfs:
    serverIP: 10.185.238.42

jupyterhub:
  scheduling:
    userScheduler:
      nodeSelector:
        hub.jupyter.org/pool-name: core-pool-2024-05-08
  proxy:
    chp:
      nodeSelector:
        hub.jupyter.org/pool-name: core-pool-2024-05-08
    traefik:
      nodeSelector:
        hub.jupyter.org/pool-name: core-pool-2024-05-08

  hub:
    config:
      OAuthenticator:
        allow_all: False
        allowed_groups:
          # Data 140, Spring 2025
          # https://bcourses.berkeley.edu/courses/1541933
          - "course::1541933"
          # Data 140, Fall 2025
          # https://bcourses.berkeley.edu/courses/1547933
          - "course::1547933"
          # DataHub staff
          - "course::1524699::group::all-admins"
    loadRoles:
      # datahub staff
      datahub-staff:
        description: Enable admin for datahub staff
        # this role provides permissions to...
        scopes:
          - admin-ui
          - admin:groups
          - admin:users
          - admin:servers
          - read:roles
          - read:hub
          - access:servers
        # this role will be assigned to...
        groups:
          - course::1524699::group::all-admins

      ## Template for enabling elevated privileges for course staff,
      # Data 140, Semester/Year, Link to GitHub issue
      #course-staff-N:
      #  description: Enable course staff to view and access servers.
      #  # this role provides permissions to...
      #  scopes:
      #    - admin-ui
      #    - list:users!group=course::N
      #    - admin:servers!group=course::N
      #    - access:servers!group=course::N
      #  # this role will be assigned to...
      #  groups:
      #    - course::N::enrollment_type::teacher
      #    - course::N::enrollment_type::ta

    nodeSelector:
      hub.jupyter.org/pool-name: core-pool-2024-05-08

  singleuser:
    extraFiles:
      # DH-305
      remove-exporters:
        mountPath: /etc/jupyter/jupyter_notebook_config.py
        stringData: |
          c.QtPDFExporter.enabled = False
          c.QtPNGExporter.enabled = False 
          c.WebPDFExporter.embed_images = True
    extraEnv:
      # Unset NotebookApp from hub/values. Necessary for recent lab versions.
      JUPYTERHUB_SINGLEUSER_APP: "jupyter_server.serverapp.ServerApp"
    nodeSelector:
      hub.jupyter.org/pool-name: prob140-pool
    storage:
      type: static
      static:
        pvcName: home-nfs-v3
        subPath: "{username}"
    memory:
      guarantee: 512M
      limit: 1G
    image: {}
