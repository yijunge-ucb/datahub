# A melding of https://ucsd-prp.gitlab.io/userdocs/jupyter/values.yaml and
# datahub-based deployment configuration.

# Nautilus does not use an NFS server.
nfsPVC:
  enabled: false

# Nautilus does not let cluster admins set this.
node-placholder:
  priorityClass:
    create: false

jupyterhub:
  scheduling:
    podPriority:
      enabled: false
    userScheduler:
      enabled: false
    userPlaceholder:
      enabled: false

  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false

  # We set this in hub/values, but we are forbidden from setting
  # net.ipv4.ip_local_port_range at Nautilus, and the proxy replicaset will
  # fail to deploy without this. This setting might not be relevant for
  # Nautilus since their proxy might not be leaky.
  proxy:
    chp:
      extraPodSpec:
        securityContext:
          sysctls: null

  hub:
    # Nautilus uses rook-ceph-block for hub db storage.
    db:
      type: sqlite-pvc
      pvc:
        accessModes:
          - ReadWriteOnce
        storage: 1Gi
        # https://docs.nrp.ai/userdocs/storage/intro/
        #storageClassName: rook-ceph-block
        # https://docs.nrp.ai/userdocs/storage/linstor/
        storageClassName: linstor-igrok
    nodeSelector:
      "topology.kubernetes.io/region": "us-west"
      "nautilus.io/linstor": "true"
    resources:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 512Mi
    # We set this in hub/values, but we should unset it on Nautilus
    networkPolicy:
      enabled: false
      egress: null
    config:
      OAuthenticator:
        allow_all: False
        allowed_groups:
          # CDSS Discovery 2025 Spring
          # https://bcourses.berkeley.edu/courses/1543936
          - "course::1543936"
          # DataHub staff
          - "course::1524699::group::all-admins"
    loadRoles:
      # datahub staff
      datahub-staff:
        description: Enable admin for datahub staff
        # this role provides permissions to...
        scopes:
          - admin-ui
          - admin:groups
          - admin:users
          - admin:servers
          - read:roles
          - read:hub
          - access:servers
        # this role will be assigned to...
        groups:
          - course::1524699::group::all-admins

  # Nautilus uses haproxy for ingress
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: haproxy
      cert-manager.io/issuer: letsencrypt
      cert-manager.io/cluster-issuer: null
    pathSuffix: ''

  singleuser:
    # Nautilus-specific configuration
    uid: 0
    fsGid: 100
    extraEnv:
      GRANT_SUDO: "yes"
      # Unset NotebookApp from hub/values. Necessary for recent lab versions.
      JUPYTERHUB_SINGLEUSER_APP: "jupyter_server.serverapp.ServerApp"
    extraPodConfig:
      securityContext:
          fsGroupChangePolicy: "OnRootMismatch"
          fsGroup: 100
    extraNodeAffinity:
      required:
        - matchExpressions:
          - 'key': 'topology.kubernetes.io/region'
            'operator': 'In'
            'values': ["us-west"]

          #- 'key': 'nautilus.io/linstor'
          #  'operator': 'In'
          #  'values': ["true"]

          # https://docs.nationalresearchplatform.org/userdocs/running/gpu-pods/
          - 'key': 'nvidia.com/gpu.product'
            'operator': 'In'
            'values': ["NVIDIA-A10", "NVIDIA-L40", "NVIDIA-L4"]
    cloudMetadata:
      blockWithIptables: false
    networkPolicy:
      enabled: false
    # /Nautilus-specific configuration
    extraFiles:
      # DH-216
      remove-exporters:
        mountPath: /etc/jupyter/jupyter_notebook_config.py
        stringData: |
          c.QtPDFExporter.enabled = False
          c.QtPNGExporter.enabled = False
          c.WebPDFExporter.enabled = False

    # Nautilus-specific configuration
    storage:
      type: dynamic
      extraLabels: {}
      extraVolumes: []
      extraVolumeMounts: []
      capacity: 20Gi
      homeMountPath: /home/jovyan
      dynamic:
        storageClass: rook-ceph-block
        pvcNameTemplate: claim-{username}{servername}
        volumeNameTemplate: volume-{username}{servername}
        storageAccessModes: [ReadWriteOnce]
    # /Nautilus-specific configuration

    startTimeout: 600
    cpu:
      limit: 3
      guarantee: 3
    memory:
      guarantee: 10G
      limit: 10G
    extraResource:
      limits:
        nvidia.com/gpu: "1"
      guarantees:
        nvidia.com/gpu: "1"

